name: Web quality

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install validation tools
        run: npm install
      - name: Validate HTML
        id: validate-html
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run lint:html 2>&1 | tee html-validation.log
      - name: Upload HTML validation report
        if: steps.validate-html.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: html-validation-report
          path: html-validation.log
      - name: Enforce HTML validation result
        if: steps.validate-html.outcome == 'failure'
        run: exit 1
      - name: Validate CSS
        run: npm run lint:css
      - name: Serve site
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/website-server.log 2>&1 &
          echo $! > /tmp/website-server.pid
          for attempt in {1..20}; do
            curl -fsS http://127.0.0.1:4173/ >/dev/null && exit 0
            sleep 0.5
          done
          cat /tmp/website-server.log
          exit 1
      - name: Run WCAG 2 AA accessibility checks
        id: validate-wcag
        continue-on-error: true
        shell: bash
        run: |
          set -uo pipefail
          status=0
          : > wcag-validation.log
          while IFS= read -r -d '' page; do
            relative="${page#./}"
            {
              echo "Checking $relative"
              npx pa11y --standard WCAG2AA "http://127.0.0.1:4173/$relative"
            } 2>&1 | tee -a wcag-validation.log || status=1
          done < <(find . -type f -name '*.html' -not -path './node_modules/*' -print0)
          exit "$status"
      - name: Upload accessibility validation report
        if: steps.validate-wcag.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: accessibility-validation-report
          path: wcag-validation.log
      - name: Enforce accessibility validation result
        if: steps.validate-wcag.outcome == 'failure'
        run: exit 1
      - name: Stop site server
        if: always()
        run: |
          if [[ -f /tmp/website-server.pid ]]; then
            kill "$(cat /tmp/website-server.pid)" || true
          fi
